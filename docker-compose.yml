version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bballvideo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: bballvideo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://bballvideo:${POSTGRES_PASSWORD:-localdev}@postgres:5432/bballvideo
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BASE_PATH=/data/bballvideo
      - STORAGE_MAX_GB=1024
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - bballvideo_storage:/data/bballvideo

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://bballvideo:${POSTGRES_PASSWORD:-localdev}@postgres:5432/bballvideo
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BASE_PATH=/data/bballvideo
      - STORAGE_MAX_GB=1024
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - bballvideo_storage:/data/bballvideo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  bballvideo_storage:
