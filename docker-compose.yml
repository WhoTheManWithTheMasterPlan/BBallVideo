# TrueNAS deployment: backend API + frontend
# Database (docker-db-1:5432) and Redis (bballvideo-redis:6380) run as standalone containers on TrueNAS

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://daytrade_user:${POSTGRES_PASSWORD}@host.docker.internal:5432/bballvideo
      - REDIS_URL=redis://host.docker.internal:6380/0
      - STORAGE_BASE_PATH=/data/bballvideo
      - STORAGE_MAX_GB=1024
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /mnt/apps/bballvideo/storage:/data/bballvideo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://192.168.68.10:8001
    depends_on:
      - backend
    restart: unless-stopped
